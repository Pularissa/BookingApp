<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flight Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h2 class="text-center mb-4">✈️ Flight Management</h2>

    <!-- Add Flight Form -->
    <div class="card p-4 mb-4 shadow-sm">
        <h5>Add New Flight</h5>
        <form th:action="@{/flights}" method="post">
            <div class="row">
                <div class="col-md-3 mb-3">
                    <input type="text" class="form-control" name="flightNumber" placeholder="Flight Number" required>
                </div>
                <div class="col-md-3 mb-3">
                    <input type="text" class="form-control" name="origin" placeholder="Origin" required>
                </div>
                <div class="col-md-3 mb-3">
                    <input type="text" class="form-control" name="destination" placeholder="Destination" required>
                </div>
                <div class="col-md-3 mb-3">
                    <input type="datetime-local" class="form-control" name="departureTime" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <input type="datetime-local" class="form-control" name="arrivalTime" required>
                </div>
                <div class="col-md-6 mb-3">
                    <input type="number" class="form-control" name="price" placeholder="Ticket Price" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Add Flight</button>
        </form>
    </div>

    <!-- Flights Table -->
    <div class="card shadow-sm p-3">
        <h5 class="mb-3">Available Flights</h5>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Flight #</th>
                <th>Origin</th>
                <th>Destination</th>
                <th>Departure</th>
                <th>Arrival</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="flight : ${flights}">
                <td th:text="${flight.id}"></td>
                <td th:text="${flight.flightNumber}"></td>
                <td th:text="${flight.origin}"></td>
                <td th:text="${flight.destination}"></td>
                <td th:text="${flight.departureTime}"></td>
                <td th:text="${flight.arrivalTime}"></td>
                <td th:text="${flight.price}"></td>
                <td>
                    <a th:href="@{'/flights/update/' + ${flight.id}}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{'/flights/delete/' + ${flight.id}}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
