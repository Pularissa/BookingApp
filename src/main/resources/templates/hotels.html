<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
    <h2 class="text-center mb-4">🏨 Hotel Management</h2>

    <div class="card p-4 mb-4 shadow-sm">
        <h5>Add New Hotel</h5>
        <form th:action="@{/hotels}" method="post" aria-label="Add new hotel form">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="name" class="form-label">Hotel Name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Hotel Name" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="location" class="form-label">Location</label>
                    <input type="text" class="form-control" id="location" name="location" placeholder="Location" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="pricePerNight" class="form-label">Price per Night</label>
                    <input type="number" class="form-control" id="pricePerNight" name="pricePerNight" placeholder="Price per Night" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Email">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="contactNumber" class="form-label">Contact Number</label>
                    <input type="text" class="form-control" id="contactNumber" name="contactNumber" placeholder="Contact Number">
                </div>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">Hotel Description</label>
                <textarea class="form-control" id="description" name="description" placeholder="Hotel Description"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Add Hotel</button>
        </form>
    </div>

    <div class="card shadow-sm p-3">
        <h5 class="mb-3">Available Hotels</h5>
        <table class="table table-bordered table-striped" aria-label="List of available hotels">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Location</th>
                <th>Price/Night</th>
                <th>Rating</th>
                <th>Contact</th>
                <th>Email</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="hotel : ${hotels}">
                <td th:text="${hotel.id}"></td>
                <td th:text="${hotel.name}"></td>
                <td th:text="${hotel.location}"></td>
                <td th:text="${hotel.pricePerNight}"></td>
                <td th:text="${hotel.rating}"></td>
                <td th:text="${hotel.contactNumber}"></td>
                <td th:text="${hotel.email}"></td>
                <td>
                    <a th:href="@{'/hotels/update/' + ${hotel.id}}" class="btn btn-sm btn-warning">Update</a>
                    <a th:href="@{'/hotels/delete/' + ${hotel.id}}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
