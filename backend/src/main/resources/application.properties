# =====================================================================
# DATABASE CONFIGURATION (PostgreSQL)
# =====================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/bookingapp
spring.datasource.username=postgres
spring.datasource.password=123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# =====================================================================
# SECURITY & SERVER CONFIGURATION
# =====================================================================
server.port=8080
spring.security.user.name=admin
spring.security.user.password=admin123
jwt.secret=f8a9d7c6e5b4a3f2d1c0b9a8e7f6d5c4b3a2f1e0d9c8b7a6e5f4d3c2b1a0f9e8

# =====================================================================
# DYNAMIC CRON CALENDAR SCHEDULER (June 12th & June 13th Peak)
# =====================================================================
# Peak Days: Runs every 1 minute (At second 0, of every minute, on days 12 and 13 of June)
hotel.scheduler.cron-peak=0 */1 * 12 6 ?

# Normal Days: Runs every 10 minutes on any other day of the year
hotel.scheduler.cron-normal=0 */10 * * * ?

# System Log Backup Timers (Runs every 30 minutes, starts 10 seconds after boot)
hotel.scheduler.backup-delay=1800000
hotel.scheduler.backup-initial-delay=10000

# File Storage Directory Path
hotel.scheduler.storage-path=./hotel_data/